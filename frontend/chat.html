<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat with Coach Scott</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #2ba5d8 0%, #34a8dd 100%);
            min-height: 100vh;
            color: #1f2937;
        }

        a {
            color: #007BFF;
        }

        .page-shell {
            max-width: 1240px;
            margin: 0 auto;
            padding: 28px 18px 20px;
        }

        .page-header {
            color: white;
            text-align: center;
            margin-bottom: 18px;
        }

        .page-header-photo {
            width: 92px;
            height: 92px;
            margin: 0 auto 12px;
            border-radius: 999px;
            overflow: hidden;
            border: 4px solid rgba(255,255,255,0.9);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
            background: rgba(255,255,255,0.22);
        }

        .page-header-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .page-header h1 {
            font-size: 28px;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .page-header p {
            font-size: 14px;
            opacity: 0.95;
        }

        .container {
            display: flex;
            align-items: stretch;
            min-height: calc(100vh - 150px);
        }

        .chat-column {
            width: 100%;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-section {
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.14);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
            height: 100%;
            flex: 1;
        }

        .chat-topbar {
            background: #1677ea;
            color: white;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-topbar-main {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-wrap {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255,255,255,0.25);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bot-meta {
            flex: 1;
            min-width: 0;
        }

        .bot-meta h2 {
            font-size: 20px;
            line-height: 1.1;
            margin-bottom: 3px;
        }

        .bot-meta p {
            font-size: 12px;
            opacity: 0.92;
        }

        .clear-button {
            background: rgba(255,255,255,0.14);
            color: white;
            border: 1px solid rgba(255,255,255,0.34);
            border-radius: 999px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background-color 0.2s ease;
            white-space: nowrap;
        }

        .clear-button:hover {
            background: rgba(255,255,255,0.24);
        }

        .shortcut-dock {
            background: white;
            border-top: 1px solid #e9edf2;
            padding: 12px 16px 10px;
            transition: padding 0.2s ease;
        }

        .shortcut-dock.compact {
            padding-top: 8px;
            padding-bottom: 8px;
        }

        .shortcut-dock-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .shortcut-dock.compact .shortcut-dock-header {
            margin-bottom: 0;
        }

        .shortcut-dock-title {
            font-size: 13px;
            font-weight: 700;
            color: #4b5563;
            letter-spacing: 0.01em;
        }

        .shortcut-dock-hint {
            font-size: 12px;
            color: #6b7280;
        }

        .shortcut-toggle {
            background: #eef4ff;
            color: #1677ea;
            border: 1px solid #cfe0ff;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .shortcut-list {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            overflow: hidden;
            max-height: 220px;
            opacity: 1;
            transition: max-height 0.22s ease, opacity 0.18s ease;
        }

        .shortcut-dock.compact .shortcut-list {
            max-height: 0;
            opacity: 0;
        }

        .shortcut-list button {
            background: white;
            color: #1677ea;
            border: 1.5px solid #1677ea;
            padding: 10px 11px;
            border-radius: 999px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            line-height: 1.3;
            min-height: 42px;
        }

        .shortcut-list button:hover {
            background: #1677ea;
            color: white;
        }


        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #f4f6f8;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: min(82%, 760px);
            padding: 13px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.45;
            white-space: normal;
        }

        .message.user {
            align-self: flex-end;
            background-color: #007BFF;
            color: white;
            border-radius: 18px 18px 0 18px;
        }

        .message.assistant {
            align-self: flex-start;
            background-color: #e9e9eb;
            color: black;
            border-radius: 18px 18px 18px 0;
        }

        .message.assistant ul {
            margin: 8px 0 8px 18px;
            padding: 0;
        }

        .message.assistant li {
            margin-bottom: 6px;
        }

        .message.assistant p + p {
            margin-top: 10px;
        }

        .input-area {
            padding: 16px 18px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
            background: white;
        }

        #chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 15px;
            font-family: inherit;
        }

        #chat-input:focus {
            border-color: #007BFF;
        }

        .send-button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 24px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: background-color 0.2s;
        }

        .send-button:hover {
            background-color: #0056b3;
        }

        .send-button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .typing-indicator {
            align-self: flex-start;
            color: #888;
            font-size: 13px;
            font-style: italic;
            margin-left: 10px;
        }

        /* Mobile responsive */
        @media (max-width: 968px) {
            .page-shell {
                padding: 18px 12px 16px;
            }

            .container {
                min-height: auto;
            }

            .chat-section {
                min-height: calc(100vh - 170px);
            }

            .shortcut-list {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .page-header-photo {
                width: 78px;
                height: 78px;
                margin-bottom: 10px;
            }

            .page-header h1 {
                font-size: 22px;
            }

            .page-header p {
                font-size: 13px;
            }

            .message {
                max-width: 90%;
            }

            #chat-box {
                padding: 16px;
            }

            .input-area {
                padding: 14px;
                gap: 10px;
            }

            #chat-input {
                min-width: 0;
                font-size: 16px;
            }

            .send-button {
                padding: 12px 18px;
            }

            .shortcut-list {
                grid-template-columns: 1fr;
            }

            .chat-topbar {
                padding: 12px 14px;
            }

            .chat-topbar-main {
                align-items: flex-start;
            }

            .bot-meta h2 {
                font-size: 18px;
            }

            .clear-button {
                padding: 8px 10px;
            }

            .shortcut-dock {
                padding: 10px 12px 8px;
            }

            .shortcut-list button {
                min-height: 40px;
                font-size: 12.5px;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <div class="page-header">
            <div class="page-header-photo">
                <img src="https://yxndmpwqvdatkujcukdv.supabase.co/storage/v1/object/public/web-content/scott-avatar.jpg" alt="Coach Scott">
            </div>
            <h1>Chat with Coach Scott</h1>
            <p>Ask about classes, coaching, workouts, the timer, and general wellness support</p>
        </div>

        <div class="container">
            <div class="chat-column">
                <div class="chat-section">
                    <div class="chat-topbar">
                        <div class="chat-topbar-main">
                            <div class="avatar-wrap">
                                <img src="https://yxndmpwqvdatkujcukdv.supabase.co/storage/v1/object/public/web-content/scott-avatar.jpg" alt="Coach Scott">
                            </div>
                            <div class="bot-meta">
                                <h2>Coach Scott Bot</h2>
                                <p>AI assistant</p>
                            </div>
                            <button class="clear-button" type="button" onclick="clearHistory()">Clear</button>
                        </div>
                    </div>

                    <div id="chat-box">
                        <div class="message assistant">
                            Hi! I'm Coach Scott's AI assistant. Ask me anything about my services, wellness, fitness, or nutrition!
                        </div>
                    </div>

                    <div class="shortcut-dock" id="shortcut-dock">
                        <div class="shortcut-dock-header">
                            <div>
                                <div class="shortcut-dock-title">Quick questions</div>
                                <div class="shortcut-dock-hint">Visible by default, tucked away while typing</div>
                            </div>
                            <button class="shortcut-toggle" id="shortcut-toggle" type="button" onclick="toggleShortcuts()">Hide</button>
                        </div>

                        <div class="shortcut-list">
                            <button type="button" onclick="askQuestion(this)">Am I fit enough for your classes?</button>
                            <button type="button" onclick="askQuestion(this)">Why coaching AND training?</button>
                            <button type="button" onclick="askQuestion(this)">What's the vibe like in your groups?</button>
                            <button type="button" onclick="askQuestion(this)">How much is this going to cost me?</button>
                            <button type="button" onclick="askQuestion(this)">What groups have free spots?</button>
                            <button type="button" onclick="askQuestion(this)">What are the gym closure dates this year?</button>
                        </div>
                    </div>

                    <div class="input-area">
                        <input id="chat-input" type="text" placeholder="Type your message..." />
                        <button class="send-button" onclick="sendMsg()">Send</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Configuration
        const FUNCTION_URL = 'https://yxndmpwqvdatkujcukdv.supabase.co/functions/v1/faq-bot';
        const STORAGE_KEY = 'coach_scott_chat_history';
        const MAX_HISTORY = 20;
        let shortcutsManuallyCollapsed = false;

        // Load history on startup
        window.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            const input = document.getElementById('chat-input');
            input.focus();
            attachShortcutDockBehavior(input);
            updateShortcutDock();
        });

        // Enter key to send
        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMsg();
            }
        });

        function loadHistory() {
            const chatBox = document.getElementById('chat-box');
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                const history = JSON.parse(stored);
                if (history.length > 0) {
                    chatBox.innerHTML = '';
                    history.forEach(msg => appendMessageToUI(msg.content, msg.role));
                }
            }
        }

        async function sendMsg() {
            const chatInput = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            const sendButton = document.querySelector('.send-button');
            const text = chatInput.value.trim();
            
            if (!text) return;

            // Update UI & Local Storage
            appendMessageToUI(text, 'user');
            saveMessage(text, 'user');
            
            chatInput.value = '';
            chatInput.disabled = true;
            sendButton.disabled = true;

            // Show typing indicator
            const loadingId = 'loading-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = loadingId;
            typingDiv.className = 'typing-indicator';
            typingDiv.textContent = 'Coach Scott Bot is typing...';
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                const messages = history.slice(-MAX_HISTORY);

                const res = await fetch(FUNCTION_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages })
                });

                const data = await res.json();
                
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                if (data.reply) {
                    appendMessageToUI(data.reply, 'assistant');
                    saveMessage(data.reply, 'assistant');
                } else {
                    appendMessageToUI("Sorry, I couldn't get a response.", 'assistant');
                }

            } catch (error) {
                console.error('Error:', error);
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();
                appendMessageToUI("Sorry, something went wrong.", 'assistant');
            } finally {
                chatInput.disabled = false;
                sendButton.disabled = false;
                chatInput.focus();
                updateShortcutDock(true);
            }
        }

        function saveMessage(content, role) {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            history.push({ role, content });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        function attachShortcutDockBehavior(input) {
            input.addEventListener('focus', () => updateShortcutDock(true));
            input.addEventListener('blur', () => {
                setTimeout(() => updateShortcutDock(false), 120);
            });
            input.addEventListener('input', () => updateShortcutDock());
        }

        function toggleShortcuts() {
            shortcutsManuallyCollapsed = !shortcutsManuallyCollapsed;
            updateShortcutDock();
        }

        function updateShortcutDock(forceFocusState = null) {
            const dock = document.getElementById('shortcut-dock');
            const toggle = document.getElementById('shortcut-toggle');
            const input = document.getElementById('chat-input');
            const isFocused = forceFocusState !== null ? forceFocusState : document.activeElement === input;
            const hasText = input.value.trim().length > 0;
            const shouldCompact = shortcutsManuallyCollapsed || isFocused || hasText;

            dock.classList.toggle('compact', shouldCompact);
            toggle.textContent = shouldCompact ? 'Show' : 'Hide';
        }

        function askQuestion(btn) {
            const input = document.getElementById('chat-input');
            input.value = btn.textContent;
            updateShortcutDock();
            sendMsg();
        }

        function clearHistory() {
            localStorage.removeItem(STORAGE_KEY);
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';
            appendMessageToUI("Hi! I'm Coach Scott's AI assistant. Ask me anything about my services, wellness, fitness, or nutrition!", 'assistant');
        }

        function renderMarkdown(text) {
            let escaped = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            escaped = escaped.replace(/\*(.+?)\*/g, '<em>$1</em>');
            escaped = escaped.replace(/^- (.+)$/gm, '<li>$1</li>');
            escaped = escaped.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
            escaped = escaped.replace(/\n\n/g, '</p><p>');
            escaped = `<p>${escaped}</p>`;
            escaped = escaped.replace(/\n/g, '<br>');
            escaped = escaped.replace(/<p><\/p>/g, '');
            return escaped;
        }

        function appendMessageToUI(text, sender) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `message ${sender}`;

            if (sender === 'user') {
                div.textContent = text;
            } else {
                div.innerHTML = renderMarkdown(text);
            }

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
