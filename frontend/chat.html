<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ask Scott — Crawford Coaching</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink:               #0e0f10;
            --slate:             #1c2330;
            --slate-mid:         #232f3e;
            --fog:               #3d4a58;
            --mist:              #7a8fa3;
            --pale:              #c8d4de;
            --white:             #f5f3ef;
            --brand-blue:        #2d86c4;
            --brand-blue-light:  #4fa3d8;
            --whole-sage:        #7a9b6d;
            --serif-display:     'Cormorant Garamond', Georgia, serif;
            --sans:              'Jost', sans-serif;
        }

        html, body {
            height: 100%;
            background: var(--ink);
            color: var(--white);
            font-family: var(--sans);
            -webkit-font-smoothing: antialiased;
        }

        /* ─── LAYOUT ─────────────────────── */
        .chat-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 720px;
            margin: 0 auto;
            border-left: 1px solid rgba(255,255,255,0.06);
            border-right: 1px solid rgba(255,255,255,0.06);
        }

        /* ─── HEADER ─────────────────────── */
        .header {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 1rem 1.4rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            background: var(--slate);
            flex-shrink: 0;
        }
        .header__avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid rgba(45,134,196,0.35);
        }
        .header__avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }
        .header__title {
            flex: 1;
            min-width: 0;
        }
        .header__title strong {
            display: block;
            font-family: var(--serif-display);
            font-weight: 400;
            font-size: 1.3rem;
            color: var(--white);
            line-height: 1.1;
        }
        .header__title span {
            font-size: 0.68rem;
            font-weight: 200;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--pale);
        }
        .header__actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-sm {
            background: none;
            border: 1px solid rgba(122,143,163,0.25);
            color: var(--mist);
            font-family: var(--sans);
            font-size: 0.62rem;
            font-weight: 300;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding: 0.35rem 0.7rem;
            cursor: pointer;
            border-radius: 1px;
            transition: color 0.2s, border-color 0.2s;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn-sm:hover { color: var(--pale); border-color: rgba(122,143,163,0.5); }

        /* ─── DISCLAIMER ─────────────────── */
        .disclaimer {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease;
            flex-shrink: 0;
        }
        .disclaimer.open { max-height: 200px; }
        .disclaimer__inner {
            padding: 1rem 1.4rem;
            background: var(--slate);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-size: 0.76rem;
            font-weight: 300;
            line-height: 1.65;
            color: var(--mist);
        }
        .disclaimer__inner strong { color: var(--pale); font-weight: 400; }
        .disclaimer__label {
            font-size: 0.6rem;
            font-weight: 400;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--brand-blue);
            margin-bottom: 0.5rem;
        }
        .disclaimer__inner a { color: var(--brand-blue); }

        /* ─── SHORTCUTS ──────────────────── */
        .shortcuts {
            padding: 0.55rem 1.4rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .shortcuts__label {
            font-size: 0.6rem;
            font-weight: 300;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--mist);
            margin-bottom: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            -webkit-user-select: none;
            transition: color 0.2s;
        }
        .shortcuts__label:hover { color: var(--pale); }
        .shortcuts__label::after {
            content: '\25B8';
            font-size: 0.6rem;
            letter-spacing: 0;
            transition: transform 0.2s;
        }
        .shortcuts.expanded .shortcuts__label::after { transform: rotate(90deg); }
        .shortcuts__list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.22s ease, opacity 0.18s ease, padding 0.2s;
            padding-bottom: 0;
        }
        .shortcuts.expanded .shortcuts__list {
            max-height: 180px;
            opacity: 1;
            padding-top: 0.55rem;
            padding-bottom: 0.1rem;
        }
        .shortcut {
            font-family: var(--sans);
            font-size: 0.72rem;
            font-weight: 300;
            color: var(--mist);
            background: none;
            border: 1px solid rgba(122,143,163,0.2);
            padding: 0.35rem 0.8rem;
            border-radius: 1px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s, background 0.2s;
            text-align: left;
            line-height: 1.3;
        }
        .shortcut:hover {
            color: var(--white);
            border-color: rgba(45,134,196,0.5);
            background: rgba(45,134,196,0.06);
        }

        /* ─── CHAT ────────────────────────── */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.4rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            scroll-behavior: smooth;
            background: var(--ink);
        }
        .chat::-webkit-scrollbar { width: 3px; }
        .chat::-webkit-scrollbar-thumb { background: var(--fog); }

        .msg {
            max-width: 82%;
            font-size: 0.88rem;
            line-height: 1.6;
            font-weight: 300;
            animation: msgIn 0.2s ease;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .msg.user {
            align-self: flex-end;
            background: var(--brand-blue);
            color: var(--white);
            padding: 0.7rem 1rem;
        }
        .msg.assistant {
            align-self: flex-start;
            background: var(--slate);
            color: var(--pale);
            padding: 0.8rem 1rem;
            border-left: 2px solid rgba(45,134,196,0.4);
        }
        .msg.assistant p + p { margin-top: 0.5rem; }
        .msg.assistant ul { margin: 0.5rem 0 0.5rem 1.2rem; }
        .msg.assistant li { margin-bottom: 0.3rem; }
        .msg.assistant strong { color: var(--white); font-weight: 400; }

        .typing {
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.7rem 1rem;
            background: var(--slate);
            border-left: 2px solid rgba(45,134,196,0.4);
        }
        .typing span {
            width: 5px;
            height: 5px;
            background: var(--mist);
            border-radius: 50%;
            animation: dot 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot {
            0%,80%,100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        /* ─── INPUT ───────────────────────── */
        .input-area {
            display: flex;
            border-top: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }
        #chat-input {
            flex: 1;
            background: var(--slate);
            border: none;
            color: var(--white);
            font-family: var(--sans);
            font-weight: 300;
            font-size: 0.88rem;
            padding: 0.85rem 1.2rem;
            outline: none;
            border-right: 1px solid rgba(255,255,255,0.06);
            transition: background 0.2s;
        }
        #chat-input::placeholder { color: var(--fog); }
        #chat-input:focus { background: var(--slate-mid); }
        .send-btn {
            background: var(--brand-blue);
            border: none;
            color: var(--white);
            font-family: var(--sans);
            font-weight: 400;
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 0.85rem 1.4rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .send-btn:hover { background: var(--brand-blue-light); }
        .send-btn:disabled { background: var(--fog); cursor: not-allowed; }

        /* ─── RESPONSIVE ──────────────────── */
        @media (max-width: 480px) {
            .chat-shell {
                border-left: none;
                border-right: none;
            }
            .header { padding: 0.8rem 1rem; }
            .chat { padding: 1rem; }
            .shortcuts { padding: 0.6rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="chat-shell">
        <div class="header">
            <div class="header__avatar">
                <img src="/scottlogo.png" alt="Scott Crawford">
            </div>
            <div class="header__title">
                <strong>Ask Scott</strong>
                <span>AI Assistant · Crawford Coaching</span>
            </div>
            <div class="header__actions">
                <a href="/" class="btn-sm">Back</a>
                <button class="btn-sm" id="disclaimer-toggle" type="button">i</button>
                <button class="btn-sm" id="clear-btn" type="button">Clear</button>
            </div>
        </div>

        <div class="disclaimer" id="disclaimer">
            <div class="disclaimer__inner">
                <div class="disclaimer__label">About this assistant</div>
                <p>AI-generated responses based on Scott's knowledge and services. Not a substitute for professional medical advice. Verify important details directly with Scott at <a href="mailto:scott@crawford-coaching.ca">scott@crawford-coaching.ca</a>.</p>
            </div>
        </div>

        <div class="shortcuts" id="shortcuts">
            <div class="shortcuts__label">Quick questions</div>
            <div class="shortcuts__list" id="shortcuts-list"></div>
        </div>

        <div class="chat" id="chat-box"></div>

        <div class="input-area">
            <input id="chat-input" type="text" placeholder="Ask a question..." autocomplete="off">
            <button class="send-btn" id="send-btn" type="button">Send</button>
        </div>
    </div>

    <script>
        const FUNCTION_URL = 'https://yxndmpwqvdatkujcukdv.supabase.co/functions/v1/faq-bot';
        const STORAGE_KEY  = 'crawford_chat_history';
        const MAX_HISTORY  = 20;
        const WELCOME      = "Hi \u2014 I'm Scott's AI assistant. Ask me anything about coaching, Synergize Fitness, the WHOLE Program, or general health and fitness.";

        const SHORTCUTS = [
            "What is coaching, exactly?",
            "Am I fit enough for Synergize?",
            "What is the WHOLE Program?",
            "What groups have free spots?",
            "How much does coaching cost?",
            "What\u2019s the difference between coaching and training?",
            "Tell me your closure dates",
        ];

        const chatBox   = document.getElementById('chat-box');
        const input     = document.getElementById('chat-input');
        const sendBtn   = document.getElementById('send-btn');
        const shortcuts = document.getElementById('shortcuts');

        // Populate shortcuts
        const list = document.getElementById('shortcuts-list');
        SHORTCUTS.forEach(q => {
            const btn = document.createElement('button');
            btn.className = 'shortcut';
            btn.textContent = q;
            btn.onclick = () => ask(q);
            list.appendChild(btn);
        });

        // Load history
        loadHistory();
        input.focus();

        // Events
        sendBtn.addEventListener('click', send);
        input.addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        });
        input.addEventListener('focus', () => collapseShortcuts(true));
        shortcuts.querySelector('.shortcuts__label').addEventListener('click', () => {
            shortcuts.classList.toggle('expanded');
        });

        document.getElementById('disclaimer-toggle').addEventListener('click', () => {
            document.getElementById('disclaimer').classList.toggle('open');
        });
        document.getElementById('clear-btn').addEventListener('click', clearHistory);

        // ─── Functions ───────────────────────
        function loadHistory() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (!stored) { appendMsg(WELCOME, 'assistant'); return; }
            const history = JSON.parse(stored);
            if (history.length === 0) { appendMsg(WELCOME, 'assistant'); return; }
            history.forEach(m => appendMsg(m.content, m.role));
        }

        function collapseShortcuts(collapse) {
            if (collapse) shortcuts.classList.remove('expanded');
        }

        function clearHistory() {
            localStorage.removeItem(STORAGE_KEY);
            chatBox.innerHTML = '';
            appendMsg(WELCOME, 'assistant');
        }

        function ask(text) {
            input.value = text;
            send();
        }

        async function send() {
            const text = input.value.trim();
            if (!text) return;

            appendMsg(text, 'user');
            saveMessage(text, 'user');
            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;
            collapseShortcuts(true);

            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.id = 'typing-indicator';
            typing.innerHTML = '<span></span><span></span><span></span>';
            chatBox.appendChild(typing);
            scrollToBottom();

            try {
                const history  = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                const messages = history.slice(-MAX_HISTORY);
                const res = await fetch(FUNCTION_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages })
                });
                const data = await res.json();
                document.getElementById('typing-indicator')?.remove();
                appendMsg(data.reply || "Sorry, I couldn\u2019t get a response.", 'assistant');
                if (data.reply) saveMessage(data.reply, 'assistant');
            } catch (err) {
                document.getElementById('typing-indicator')?.remove();
                appendMsg("Something went wrong. Please try again.", 'assistant');
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }

        function saveMessage(content, role) {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            history.push({ role, content });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function renderMarkdown(text) {
            let out = text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
            return `<p>${out}</p>`.replace(/<p><\/p>/g, '');
        }

        function appendMsg(text, role) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerHTML = role === 'user'
                ? text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                : renderMarkdown(text);
            chatBox.appendChild(div);
            scrollToBottom();
        }
    </script>
</body>
</html>
